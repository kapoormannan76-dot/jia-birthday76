<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday Jia Ji ❤️</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:linear-gradient(135deg,#ffd6e8,#fff);
overflow:hidden;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.container{
text-align:center;
padding:20px;
max-width:450px;
}

button{
padding:15px 30px;
border:none;
border-radius:40px;
font-size:18px;
background:#ff4f8b;
color:white;
cursor:pointer;
box-shadow:0 8px 20px rgba(0,0,0,.2);
transition:.3s;
}

button:hover{
transform:scale(1.08);
}

#content{
display:none;
animation:fade 1s;
}

@keyframes fade{
from{opacity:0;transform:scale(.8);}
to{opacity:1;transform:scale(1);}
}

img{
width:250px;
border-radius:25px;
margin-top:20px;
box-shadow:0 10px 25px rgba(0,0,0,.2);
}

h1{
margin-top:20px;
color:#ff2e75;
font-size:32px;
}

#typewriter{
margin-top:20px;
font-size:20px;
color:#444;
min-height:90px;
}

.final{
margin-top:25px;
font-size:22px;
color:#ff4f8b;
font-weight:bold;
}

.heart{
position:fixed;
font-size:25px;
animation:float 6s linear infinite;
pointer-events:none;
}

@keyframes float{
0%{
transform:translateY(100vh);
opacity:1;
}
100%{
transform:translateY(-120vh);
opacity:0;
}
}

canvas{
position:fixed;
left:0;
top:0;
pointer-events:none;
}

@media(max-width:500px){

img{
width:90%;
}

h1{
font-size:28px;
}

#typewriter{
font-size:18px;
}
}
</style>
</head>

<body>

<canvas id="confetti"></canvas>

<div class="container">

<button id="openBtn">🎁 Open Surprise</button>

<div id="content">

<h1>Happy Birthday Jia Ji 🥰</h1>

<div id="typewriter"></div>

<img src="jia.jpg" alt="Jia">

<div class="final">
❤️ Stay Healthy and Blessed ❤️
<br><br>
May your smile always shine brighter than the stars ✨
</div>

</div>

<audio id="music" loop>
<source src="music.mp3" type="audio/mpeg">
</audio>

</div>

<script>

const msg="Dear Jia Ji ❤️,\nWishing you endless happiness, love and beautiful memories.\nMay every dream come true.\nYou deserve all the happiness in the world. 🥹💖";

let i=0;

function typeWriter(){

if(i<msg.length){

document.getElementById("typewriter").innerHTML+=msg.charAt(i);

i++;

setTimeout(typeWriter,45);

}

}

document.getElementById("openBtn").onclick=()=>{

document.getElementById("openBtn").style.display="none";

document.getElementById("content").style.display="block";

document.getElementById("music").play();

typeWriter();

confettiBurst();

setInterval(createHeart,250);

};

function createHeart(){

const h=document.createElement("div");

h.className="heart";

h.innerHTML="💖";

h.style.left=Math.random()*100+"vw";

h.style.fontSize=(20+Math.random()*25)+"px";

document.body.appendChild(h);

setTimeout(()=>h.remove(),6000);

}

// CONFETTI

const canvas=document.getElementById("confetti");

const ctx=canvas.getContext("2d");

canvas.width=window.innerWidth;

canvas.height=window.innerHeight;

let confetti=[];

function confettiBurst(){

for(let i=0;i<250;i++){

confetti.push({

x:Math.random()*canvas.width,

y:Math.random()*canvas.height-canvas.height,

r:Math.random()*6+2,

d:Math.random()*250,

color:`hsl(${Math.random()*360},100%,70%)`,

tilt:Math.random()*10-10,

tiltAngleIncremental:(Math.random()*0.07)+.05,

tiltAngle:0

});

}

draw();

}

function draw(){

ctx.clearRect(0,0,canvas.width,canvas.height);

confetti.forEach((c)=>{

c.tiltAngle+=c.tiltAngleIncremental;

c.y+=(Math.cos(c.d)+3+c.r/2)/2;

c.x+=Math.sin(c.tiltAngle);

c.tilt=Math.sin(c.tiltAngle)*15;

ctx.beginPath();

ctx.lineWidth=c.r;

ctx.strokeStyle=c.color;

ctx.moveTo(c.x+c.tilt+c.r/2,c.y);

ctx.lineTo(c.x+c.tilt,c.y+c.tilt);

ctx.stroke();

});

requestAnimationFrame(draw);

}

window.onresize=()=>{

canvas.width=window.innerWidth;

canvas.height=window.innerHeight;

}

</script>

</body>
</html>
